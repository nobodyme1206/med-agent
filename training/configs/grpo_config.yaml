# GRPO 训练超参配置参考
# 实际使用 grpo_train.py 的命令行参数

# 模型
model_path: /root/autodl-tmp/output/qwen2.5-7b-med-agent-sft
use_qlora: true

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# GRPO
beta: 0.1                       # KL 散度惩罚系数
num_generations: 4               # 每 prompt 采样数（组大小）
max_completion_length: 1024      # 最大生成长度

# 训练
learning_rate: 5.0e-6
per_device_train_batch_size: 1
gradient_accumulation_steps: 16  # 有效 batch = 1 * 16 = 16
num_train_epochs: 1
bf16: true

# 奖励函数权重
reward_weights:
  task_completion: 0.4
  tool_accuracy: 0.3
  safety: 0.2
  format: 0.1

# 预估显存：QLoRA 4bit 7B + 4 generations ≈ 18-22GB（RTX 4090 可容纳）
