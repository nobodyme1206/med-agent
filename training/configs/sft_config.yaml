# Agentic SFT 配置（LLaMA-Factory 格式）
# 用法: llamafactory-cli train training/configs/sft_config.yaml

### Model
model_name_or_path: /root/autodl-tmp/models/Qwen/Qwen2___5-7B-Instruct

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all
lora_dropout: 0.05

### Dataset
# 需要在 LLaMA-Factory/data/dataset_info.json 中注册 med_agent_sft 数据集
dataset: med_agent_sft
dataset_dir: /root/autodl-tmp/data
template: qwen
cutoff_len: 4096
overwrite_cache: true

### Output
output_dir: /root/autodl-tmp/output/qwen2.5-7b-med-agent-sft
logging_steps: 10
save_steps: 100
save_total_limit: 3
overwrite_output_dir: true

### Training
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### Evaluation
val_size: 0.05
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 100
